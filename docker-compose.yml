services:
  web:
    image: web:latest
    build:
      context: ./web
      target: development
    volumes:
      - ./web:/app
      - /app/node_modules
    ports:
      - 5173:5173
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # In Docker the frontend uses a Vite proxy to reach the ai service,
      # so VITE_AI_SERVICE_URL must be empty (overrides the value from .env)
      - VITE_AI_SERVICE_URL=
      - VITE_PROXY_AI_TARGET=http://ai:8000
    networks:
      - default
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --timeout=3 --spider http://127.0.0.1:5173/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 40s

  ai:
    build:
      context: ./ai
      dockerfile: Dockerfile
    ports:
      - 8000:8000
    env_file: .env
    environment:
      - PORT=8000
    depends_on:
      phoenix:
        condition: service_started
    restart: unless-stopped
    networks:
      - default
    volumes:
      - ./ai:/app
      - ai-venv:/app/.venv
    entrypoint:
      - uv
      - run
      - --frozen
      - python
      - run.py
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  phoenix:
    image: arizephoenix/phoenix:version-12.4.0
    env_file: .env
    ports:
      - "6006:6006"
    restart: unless-stopped
    networks:
      - default
    depends_on:
      phoenix-db:
        condition: service_healthy

  phoenix-db:
    image: "postgres:16.4-alpine"
    env_file: .env
    restart: unless-stopped
    networks:
      - default
    volumes:
      - phoenix-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  voice-agent:
    build:
      context: ./services/voice-agent
    env_file: .env
    restart: unless-stopped
    networks:
      - default

volumes:
  phoenix-data:
  ai-venv:

networks:
  default:
