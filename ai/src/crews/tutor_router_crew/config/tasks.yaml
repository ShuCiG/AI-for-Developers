router_task:
  description: >
    You are a language tutor router. Given the user's latest message and recent conversation history, classify the intent.

    Allowed intents (language learning only):
    - translation: user asks how to say a word/phrase in another language
    - new_word: user asks for a new word to learn, or vocabulary suggestion
    - grammar: user asks about grammar, verb conjugation, sentence structure
    - example_sentences: user wants example sentences or usage context
    - practice: user wants to practice writing and get corrections
    - save_word: user wants to add a word to their list / flashcard deck
    - cultural: user asks about formal vs informal, cultural context of language use
    - off_topic: request is NOT about language (recipes, math, general knowledge, opinions on non-language topics, casual chat unrelated to learning)

    User message: {message}

    Recent conversation history (oldest first):
    {history}

    Rules:
    - If the request is clearly about learning or using a language (translation, grammar, vocabulary, practice, examples, culture), choose the matching intent.
    - If the request is off-topic (recipes, math, coding, general knowledge, non-language opinions), you MUST return intent "off_topic".
    - Optionally set source_language and target_language if the user has specified or implied them.

    Return a JSON object with: intent, reasoning, source_language (or null), target_language (or null).
  expected_output: >
    JSON with intent (one of the allowed values), reasoning (short), source_language (string or null), target_language (string or null).
  agent: tutor_router
